server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health-check endpoint
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Serve the SPA under /FinInsightAI/
    # All sub-routes fall back to index.html for client-side routing
    location /FinInsightAI/ {
        try_files $uri $uri/ /FinInsightAI/index.html;
    }

    # Redirect bare root to the app base path
    location = / {
        return 301 /FinInsightAI/;
    }

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;
}
